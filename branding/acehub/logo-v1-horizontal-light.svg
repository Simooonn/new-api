<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200">
  <!-- AceHub horizontal lockup for light backgrounds.
       Note: wordmark uses system fonts; convert text to outlines before production export. -->
  <defs>
    <!-- gi: userSpaceOnUse in the glyph's local coords (horizontal crossbar has a zero-height bbox);
         gt: objectBoundingBox is fine for text -->
    <linearGradient id="gi" gradientUnits="userSpaceOnUse" x1="96" y1="96" x2="416" y2="416">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <g transform="translate(24 25) scale(0.293)">
    <path d="M256 104 L136 408 M256 104 L376 408" stroke="url(#gi)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M170 322 L342 322" stroke="url(#gi)" stroke-width="40" stroke-linecap="round" fill="none"/>
    <circle cx="256" cy="104" r="34" fill="url(#gi)"/>
    <circle cx="136" cy="408" r="34" fill="url(#gi)"/>
    <circle cx="376" cy="408" r="34" fill="url(#gi)"/>
    <circle cx="256" cy="322" r="48" fill="url(#gi)"/>
    <circle cx="256" cy="322" r="20" fill="#FFFFFF"/>
  </g>
  <text x="208" y="136" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="104" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#gt)">Ace</tspan><tspan fill="#0F172A">Hub</tspan>
  </text>
</svg>
