<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- AceHub v2 "loop": open bud shell with a wide mouth; the hub sits in the
       opening as the gateway "port". -->
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="122" y1="76" x2="390" y2="438">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- open shell: bottom-left, up over the apex, down to bottom-right -->
  <path d="M198 428 C 152 410, 122 366, 122 298 C 122 208, 200 152, 256 76 C 312 152, 390 208, 390 298 C 390 366, 360 410, 314 428"
        fill="none" stroke="url(#g)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- hub in the opening -->
  <circle cx="256" cy="430" r="34" fill="url(#g)"/>
  <circle cx="256" cy="430" r="14" fill="#FFFFFF"/>
</svg>
