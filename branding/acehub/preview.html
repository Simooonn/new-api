<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AceHub 品牌图标预览</title>
<style>
  body { margin: 0; font-family: -apple-system, "Segoe UI", sans-serif; }
  section { padding: 40px; }
  .light { background: #F8FAFC; color: #0F172A; }
  .dark  { background: #0B1220; color: #F8FAFC; }
  h2 { font-size: 16px; font-weight: 600; opacity: .7; margin: 0 0 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 40px; align-items: flex-end; }
  figure { margin: 0; text-align: center; }
  figcaption { font-size: 12px; opacity: .6; margin-top: 10px; }
  img.icon-lg { width: 160px; }
  img.icon-md { width: 96px; }
  img.icon-sm { width: 32px; }
  img.icon-xs { width: 16px; }
  img.logo { width: 380px; }
</style>
</head>
<body>

<section class="light">
  <h2>定稿:aperture 光圈 · 全套资产</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-primary.svg"><figcaption>主图标 icon-primary</figcaption></figure>
    <figure><img class="icon-lg" src="icon-app-dark.svg"><figcaption>App 图标 icon-app-dark</figcaption></figure>
    <figure>
      <img class="icon-md" src="favicon.svg">
      <img class="icon-sm" src="favicon.svg">
      <img class="icon-xs" src="favicon.svg">
      <figcaption>favicon 96 / 32 / 16 px</figcaption>
    </figure>
  </div>
  <div class="row" style="margin-top:40px">
    <figure><img class="logo" src="logo-horizontal-light.svg"><figcaption>横版 Logo(浅色用)</figcaption></figure>
  </div>
</section>

<section class="dark">
  <h2>定稿 · 深色背景</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-primary.svg"><figcaption>主图标</figcaption></figure>
    <figure><img class="icon-lg" src="favicon.svg"><figcaption>favicon 加粗版</figcaption></figure>
    <figure><img class="logo" src="logo-horizontal-dark.svg"><figcaption>横版 Logo(深色用)</figcaption></figure>
  </div>
</section>

<section class="light">
  <h2>V3 探索方案(flow 变体 + 全新方向)</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v3-flow-asym.svg"><figcaption>flow-asym 不对称汇流</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-flow-orbit.svg"><figcaption>flow-orbit 环穿流线</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-aperture.svg"><figcaption>aperture 光圈</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-negative-a.svg"><figcaption>negative-A 负形 A</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-spade-liquid.svg"><figcaption>spade-liquid 液态黑桃</figcaption></figure>
  </div>
  <div class="row" style="margin-top:40px">
    <figure>
      <img class="icon-md" src="icon-v3-flow-asym.svg">
      <img class="icon-sm" src="icon-v3-flow-asym.svg">
      <img class="icon-xs" src="icon-v3-flow-asym.svg">
      <figcaption>flow-asym 96 / 32 / 16 px</figcaption>
    </figure>
    <figure>
      <img class="icon-md" src="icon-v3-aperture.svg">
      <img class="icon-sm" src="icon-v3-aperture.svg">
      <img class="icon-xs" src="icon-v3-aperture.svg">
      <figcaption>aperture 96 / 32 / 16 px</figcaption>
    </figure>
    <figure>
      <img class="icon-md" src="icon-v3-negative-a.svg">
      <img class="icon-sm" src="icon-v3-negative-a.svg">
      <img class="icon-xs" src="icon-v3-negative-a.svg">
      <figcaption>negative-A 96 / 32 / 16 px</figcaption>
    </figure>
  </div>
</section>

<section class="dark">
  <h2>V3 探索方案 · 深色背景</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v3-flow-asym.svg"><figcaption>flow-asym</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-flow-orbit.svg"><figcaption>flow-orbit</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-aperture.svg"><figcaption>aperture</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-negative-a.svg"><figcaption>negative-A</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v3-spade-liquid.svg"><figcaption>spade-liquid</figcaption></figure>
  </div>
</section>

<section class="light">
  <h2>V2 融合方案(曲线化,去直白 A / 黑桃)</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v2-flow.svg"><figcaption>V2 主推:flow 双流汇聚</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v2-loop.svg"><figcaption>V2 备选:loop 开口环</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v2-bloom.svg"><figcaption>V2 备选:bloom 实心花苞</figcaption></figure>
    <figure>
      <img class="icon-md" src="icon-v2-flow.svg">
      <img class="icon-sm" src="icon-v2-flow.svg">
      <img class="icon-xs" src="icon-v2-flow.svg">
      <figcaption>flow 96 / 32 / 16 px</figcaption>
    </figure>
  </div>
</section>

<section class="dark">
  <h2>V2 融合方案 · 深色背景</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v2-flow.svg"><figcaption>flow</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v2-loop.svg"><figcaption>loop</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v2-bloom.svg"><figcaption>bloom</figcaption></figure>
  </div>
</section>

<section class="light">
  <h2>V1 方案(存档)</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v1-primary.svg"><figcaption>主图标 icon-v1-primary</figcaption></figure>
    <figure><img class="icon-lg" src="icon-v1-app-dark.svg"><figcaption>App 图标 icon-v1-app-dark</figcaption></figure>
    <figure><img class="icon-lg" src="icon-alt-spade.svg"><figcaption>备选:黑桃 icon-alt-spade</figcaption></figure>
    <figure><img class="icon-lg" src="icon-alt-hex.svg"><figcaption>备选:六边形 icon-alt-hex</figcaption></figure>
  </div>
  <div class="row" style="margin-top:40px">
    <figure><img class="logo" src="logo-v1-horizontal-light.svg"><figcaption>横版 Logo(浅色用)</figcaption></figure>
    <figure>
      <img class="icon-md" src="favicon-v1.svg">
      <img class="icon-sm" src="favicon-v1.svg">
      <img class="icon-xs" src="favicon-v1.svg">
      <figcaption>favicon 96 / 32 / 16 px</figcaption>
    </figure>
  </div>
</section>

<section class="dark">
  <h2>V1 方案(存档)· 深色背景</h2>
  <div class="row">
    <figure><img class="icon-lg" src="icon-v1-primary.svg"><figcaption>主图标</figcaption></figure>
    <figure><img class="icon-lg" src="icon-alt-spade.svg"><figcaption>黑桃</figcaption></figure>
    <figure><img class="icon-lg" src="icon-alt-hex.svg"><figcaption>六边形</figcaption></figure>
    <figure><img class="logo" src="logo-v1-horizontal-dark.svg"><figcaption>横版 Logo(深色用)</figcaption></figure>
  </div>
</section>

</body>
</html>
