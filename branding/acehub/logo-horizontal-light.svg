<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200">
  <!-- AceHub horizontal lockup for light backgrounds, aperture glyph.
       Note: wordmark uses system fonts; convert text to outlines before production export. -->
  <defs>
    <!-- gi: userSpaceOnUse in the glyph's local coords; gt: objectBoundingBox is fine for text -->
    <linearGradient id="gi" gradientUnits="userSpaceOnUse" x1="108" y1="80" x2="404" y2="432">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <g transform="translate(-10 -5) scale(0.41)">
    <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#gi)" stroke-width="44" stroke-linecap="round"/>
    <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#gi)" stroke-width="44" stroke-linecap="round" transform="rotate(120 256 256)"/>
    <path d="M256 96 C 346 96, 393 261, 327 327" fill="none" stroke="url(#gi)" stroke-width="44" stroke-linecap="round" transform="rotate(240 256 256)"/>
    <circle cx="256" cy="256" r="36" fill="url(#gi)"/>
    <circle cx="256" cy="256" r="15" fill="#FFFFFF"/>
  </g>
  <text x="200" y="136" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="104" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#gt)">Ace</tspan><tspan fill="#0F172A">Hub</tspan>
  </text>
</svg>
