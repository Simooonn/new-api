<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- AceHub v3 "spade-liquid": the spade fully liquefied — a soft drop
       (rounded tip, no cusp) about to land on a shallow surface ripple;
       port hole punched in the drop. -->
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="120" y1="80" x2="392" y2="440">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- drop -->
  <path fill="url(#g)" fill-rule="evenodd" d="
    M234 116
    C 196 178, 148 216, 148 284
    C 148 344, 196 384, 256 384
    C 316 384, 364 344, 364 284
    C 364 216, 316 178, 278 116
    C 266 96, 246 96, 234 116
    Z
    M256 236
    a 40 40 0 1 0 0.001 0
    Z"/>
  <!-- surface ripple -->
  <path d="M120 428 C 176 396, 336 396, 392 428" fill="none" stroke="url(#g)" stroke-width="26" stroke-linecap="round"/>
</svg>
